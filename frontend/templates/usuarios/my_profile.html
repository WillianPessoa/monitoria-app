{% extends 'base.html' %}
{% block title %}Meu perfil de monitoria{% endblock %}
{% block content %}
<section class="card">
  <h2>Meu perfil de monitoria</h2>
  <p class="muted">Essas informacoes sao usadas na sua atuacao como monitor.</p>
  <form method="post">
    <label for="contato">Contato</label>
    <input id="contato" name="contato" value="{{ user.contato or '' }}" />

    <label for="disponibilidade">Disponibilidade</label>
    <textarea id="disponibilidade" name="disponibilidade">{{ user.disponibilidade or '' }}</textarea>

    <button class="button" type="submit">Salvar</button>
  </form>
</section>
{% endblock %}
