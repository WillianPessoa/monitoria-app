{% extends 'base_auth.html' %}
{% block title %}Entrar — Monitoria App{% endblock %}
{% block content %}
<div class="auth-card">
  <div class="auth-logo">
    <span class="auth-logo-mark" aria-hidden="true"></span>
    <span class="auth-logo-name">Monitoria App</span>
  </div>
  <h1 class="auth-title">Entrar</h1>
  <p class="auth-sub">Acesse com seu e-mail e senha institucional.</p>

  <form method="post" class="form-stack">
    <label for="email">E-mail
      <input id="email" name="email" type="email" placeholder="voce@email.com" required autocomplete="email" />
    </label>
    <label for="senha">Senha
      <input id="senha" name="senha" type="password" placeholder="••••••••" required autocomplete="current-password" />
    </label>
    <button type="submit" style="margin-top:6px;justify-content:center;">Entrar</button>
  </form>

  <p class="muted" style="margin-top:16px;font-size:12.5px;line-height:1.5;">
    Primeiro acesso? Use a senha temporária enviada pelo administrador.
  </p>
</div>
{% endblock %}
