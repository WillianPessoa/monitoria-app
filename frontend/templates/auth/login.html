{% extends 'base.html' %}
{% block title %}Login - Monitoria App{% endblock %}
{% block content %}
<section class="card" style="max-width: 480px; margin: 0 auto;">
  <h2>Login</h2>
  <p>Usuarios com status PENDENTE usam a senha temporaria recebida no cadastro para definir a senha definitiva no primeiro acesso.</p>
  <form method="post">
    <label for="email">Email</label>
    <input id="email" name="email" type="email" required />

    <label for="senha">Senha</label>
    <input id="senha" name="senha" type="password" required />

    <button type="submit" class="button">Entrar</button>
  </form>
</section>
{% endblock %}
